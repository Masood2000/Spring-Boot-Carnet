spring:
  application:
    name: spring-boot-carnet
  # OracleDB connection settings
  # datasource:
  #   url: jdbc:oracle:thin:@localhost:1521/xe
  #   username: C##MASOOD
  #   password: --------
  #   driver-class-name: oracle.jdbc.OracleDriver

  datasource:
    # Standard H2 In-Memory URL
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  # used for h2 to tell to create schema each time
  sql:
     init:
       mode: always


